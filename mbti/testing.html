<script>
// 64道MBTI测试题目
const questions = [
    // E vs I (16题) - 外向 vs 内向
    { dim: 'EI', text: '在社交聚会中，我通常是活跃气氛的那个人' },
    { dim: 'EI', text: '我更喜欢与很多人一起活动，而不是独处' },
    { dim: 'EI', text: '我倾向于用口头表达而不是书面表达来分享想法' },
    { dim: 'EI', text: '与他人交流能让我感到充满能量' },
    { dim: 'EI', text: '我很容易和陌生人打开话题交谈' },
    { dim: 'EI', text: '我更喜欢在团队中合作而不是独自工作' },
    { dim: 'EI', text: '空闲时间我更愿意参加社交活动而不是独自待着' },
    { dim: 'EI', text: '我倾向于先说再做，而不是先想后说' },
    { dim: 'EI', text: '我更喜欢开放热闹的工作环境' },
    { dim: 'EI', text: '我容易通过交谈来理解问题' },
    { dim: 'EI', text: '在公众场合发言对我来说是比较自然的事' },
    { dim: 'EI', text: '我喜欢同时处理多个任务而不是专注单一工作' },
    { dim: 'EI', text: '我倾向于结交许多新朋友' },
    { dim: 'EI', text: '我的兴奋情绪会明显地表现在外面' },
    { dim: 'EI', text: '我更喜欢广度接触各类事物而不是深度钻研' },
    { dim: 'EI', text: '与陌生人交谈让我感到兴奋而不是紧张' },

    // S vs N (16题) - 感觉 vs 直觉
    { dim: 'SN', text: '我更关注事物的具体事实和细节，而不是抽象的概念' },
    { dim: 'SN', text: '我更喜欢实实在在的技能而不是抽象的理论' },
    { dim: 'SN', text: '解决问题时我倾向于使用经过验证的经验方法' },
    { dim: 'SN', text: '我更容易记住具体的事情和数据，而不是抽象的概念' },
    { dim: 'SN', text: '我更相信亲眼所见的事实而不是直觉' },
    { dim: 'SN', text: '学习新事物时，我会先了解具体操作方法' },
    { dim: 'SN', text: '我更看重实际经验和技能，而不是抽象的理论' },
    { dim: 'SN', text: '我喜欢按部就班的工作而不是富有变化的' },
    { dim: 'SN', text: '我更容易理解具体可感的事物，而不是抽象的概念' },
    { dim: 'SN', text: '我倾向于描述具体细节而不是整体印象' },
    { dim: 'SN', text: '我喜欢传统可靠的方法而不是新颖独特的方式' },
    { dim: 'SN', text: '我更容易看到事物的现状而不是预见未来可能' },
    { dim: 'SN', text: '我喜欢确定已知的事物而不是探索未知领域' },
    { dim: 'SN', text: '我更容易发现细节问题而不是整体趋势' },
    { dim: 'SN', text: '我决策时更依赖过往的数据和信息' },
    { dim: 'SN', text: '我更关注现在而不是未来的可能性' },

    // T vs F (16题) - 思考 vs 情感
    { dim: 'TF', text: '做决定时我更看重逻辑和客观分析，而不是个人情感' },
    { dim: 'TF', text: '当我不同意某人时，我会直接指出问题' },
    { dim: 'TF', text: '我更容易被有逻辑的论点说服，而不是被情感打动' },
    { dim: 'TF', text: '在争论中我更倾向于坚持原则，对事不对人' },
    { dim: 'TF', text: '评价一件事时我更在意是否公平合理，而不是是否让人愉快' },
    { dim: 'TF', text: '我更容易客观地分析情况而不是设身处地理解他人' },
    { dim: 'TF', text: '我更欣赏理性思考的能力，而不是感性的直觉' },
    { dim: 'TF', text: '做决定时我倾向于先思考再行动' },
    { dim: 'TF', text: '我更容易指出别人的错误而不是照顾别人的情绪' },
    { dim: 'TF', text: '我看重效率和结果而不是过程中的关系' },
    { dim: 'TF', text: '在冲突中我更关注问题的对错而不是双方的感受' },
    { dim: 'TF', text: '我更认同公正无私的原则而不是因人而异的关怀' },
    { dim: 'TF', text: '当我安慰别人时，我会分析问题给出建议' },
    { dim: 'TF', text: '我更容易被理性的分析打动而不是真诚的情感' },
    { dim: 'TF', text: '工作中我更注重任务完成的质量而不是团队氛围' },
    { dim: 'TF', text: '我倾向于用逻辑说服别人而不是用情感打动人' },

    // J vs P (16题) - 判断 vs 知觉
    { dim: 'JP', text: '面对重要任务，我会先制定详细计划再行动' },
    { dim: 'JP', text: '我更喜欢按部就班、有清晰步骤的工作方式' },
    { dim: 'JP', text: '当别人问我问题时，我倾向于给出一个明确的答案' },
    { dim: 'JP', text: '我的房间或工作区域通常是整洁有序的' },
    { dim: 'JP', text: '我严格遵守约定的时间，几乎从不迟到' },
    { dim: 'JP', text: '我更喜欢提前规划好行程而不是随性走到哪算哪' },
    { dim: 'JP', text: '做决定时我倾向于尽快做出决定并执行' },
    { dim: 'JP', text: '当我列出待办清单，我会严格按照清单完成' },
    { dim: 'JP', text: '我喜欢稳定可预测的生活节奏' },
    { dim: 'JP', text: '面对规则和制度，我会尊重并严格执行' },
    { dim: 'JP', text: '我更倾向于在截止日期前预留充足时间完成工作，而不是等到最后一刻' },
    { dim: 'JP', text: '我更看重工作中的明确目标而不是自由发挥空间' },
    { dim: 'JP', text: '我更希望别人评价我可靠、守时、言出必行，而不是有创意、灵活' },
    { dim: 'JP', text: '面对生活中的不确定性，我会尽量减少不确定因素' },
    { dim: 'JP', text: '我喜欢完成一件事带来的成就感而不是开始新事物带来的兴奋感' },
    { dim: 'JP', text: '我习惯把事情做完后再开始新的事情，而不是同时进行多项任务' }
];

// 存储答案
let answers = {};

// 从URL获取当前题目
function getCurrentQuestion() {
    const params = new URLSearchParams(window.location.search);
    const q = parseInt(params.get('q')) || 1;
    return Math.max(1, Math.min(q, questions.length));
}

// 加载保存的答案
function loadAnswers() {
    const saved = localStorage.getItem('mbti_answers');
    if (saved) {
        answers = JSON.parse(saved);
    }
}

// 保存答案
function saveAnswers() {
    localStorage.setItem('mbti_answers', JSON.stringify(answers));
}

// 显示当前题目
function showQuestion() {
    const q = getCurrentQuestion();
    const question = questions[q - 1];

    document.getElementById('currentNum').textContent = q;
    document.getElementById('totalNum').textContent = questions.length;
    document.getElementById('questionText').textContent = '"' + question.text + '"';

    const progress = (q / questions.length) * 100;
    document.getElementById('progressFill').style.width = progress + '%';
    document.getElementById('progressPercent').textContent = Math.round(progress) + '%';

    // 恢复之前的选择
    document.querySelectorAll('.likert-circle').forEach(btn => {
        btn.classList.remove('selected');
    });
    if (answers[q]) {
        const selectedBtn = document.querySelector(`[data-score="${answers[q]}"]`);
        if (selectedBtn) {
            selectedBtn.classList.add('selected');
        }
    }
}

// 选择分数
function selectScore(score) {
    const q = getCurrentQuestion();
    answers[q] = score;
    saveAnswers();

    // 移除所有选中状态
    document.querySelectorAll('.likert-circle').forEach(btn => {
        btn.classList.remove('selected');
    });

    // 添加选中状态
    const selectedBtn = document.querySelector(`[data-score="${score}"]`);
    if (selectedBtn) {
        selectedBtn.classList.add('selected');
    }

    // 自动进入下一题
    setTimeout(() => {
        if (q < questions.length) {
            goToQuestion(q + 1);
        } else {
            showResult();
        }
    }, 300);
}

// 前往指定题目
function goToQuestion(q) {
    window.location.href = '?q=' + q;
}

// 上一题
function prevQuestion() {
    const q = getCurrentQuestion();
    if (q > 1) {
        goToQuestion(q - 1);
    }
}

// 下一题
function nextQuestion() {
    const q = getCurrentQuestion();
    if (!answers[q]) {
        alert('请选择一个选项');
        return;
    }
    if (q < questions.length) {
        goToQuestion(q + 1);
    } else {
        showResult();
    }
}

// 显示结果
function showResult() {
    // 计算各维度得分
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    questions.forEach((q, index) => {
        const answer = answers[index + 1];
        if (answer) {
            // 7分制：1-3偏向第一个字母(E/S/T/J)，5-7偏向第二个字母(I/N/F/P)，4是中性
            if (q.dim === 'EI') {
                if (answer <= 3) scores.E += (4 - answer);
                else if (answer >= 5) scores.I += (answer - 4);
            } else if (q.dim === 'SN') {
                if (answer <= 3) scores.S += (4 - answer);
                else if (answer >= 5) scores.N += (answer - 4);
            } else if (q.dim === 'TF') {
                if (answer <= 3) scores.T += (4 - answer);
                else if (answer >= 5) scores.F += (answer - 4);
            } else if (q.dim === 'JP') {
                if (answer <= 3) scores.J += (4 - answer);
                else if (answer >= 5) scores.P += (answer - 4);
            }
        }
    });

    // 确定类型
    let mbti = '';
    mbti += scores.E >= scores.I ? 'E' : 'I';
    mbti += scores.S >= scores.N ? 'S' : 'N';
    mbti += scores.T >= scores.F ? 'T' : 'F';
    mbti += scores.J >= scores.P ? 'J' : 'P';

    // 计算各维度百分比
    const totalI = scores.I + scores.E;
    const totalS = scores.S + scores.N;
    const totalT = scores.T + scores.F;
    const totalJ = scores.J + scores.P;

    const dim1Percent = totalI > 0 ? Math.round((scores.I / totalI) * 100) : 50; // I
    const dim2Percent = totalS > 0 ? Math.round((scores.N / totalS) * 100) : 50; // N
    const dim3Percent = totalT > 0 ? Math.round((scores.T / totalT) * 100) : 50; // T
    const dim4Percent = totalJ > 0 ? Math.round((scores.J / totalJ) * 100) : 50; // J

    // 计算-A或-T：基于各维度的"坚定程度"（离50%的平均距离）
    // 距离50%越远越坚定(-A)，越近越犹豫(-T)
    const confidence = (Math.abs(dim1Percent - 50) + Math.abs(dim2Percent - 50) + Math.abs(dim3Percent - 50) + Math.abs(dim4Percent - 50)) / 4;
    const assertive = confidence >= 20 ? 'A' : 'T'; // 平均偏差>=20%为坚定型

    // 将分数数据编码到URL（包含-A/-T）
    const scoresData = `${dim1Percent},${dim2Percent},${dim3Percent},${dim4Percent}`;

    // 跳转到结果页显示结果
    window.location.href = 'https://mbti.7373.com.cn/result.html?result=' + mbti + assertive + '&scores=' + scoresData;
}

// 初始化
loadAnswers();
showQuestion();
</script>
