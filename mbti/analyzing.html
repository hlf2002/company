<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&amp;family=Zhi+Mang+Xing&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "sage": "#788f77",
                        "warm-beige": "#f9f6f1",
                        "charcoal": "#2d2d2d",
                        "soft-clay": "#e8e1d9",
                        "primary": "#788f77",
                    },
                    fontFamily: {
                        "sans": ["Noto Sans SC", "sans-serif"],
                        "serif": ["Zhi Mang Xing", "serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-warm-beige text-charcoal font-sans antialiased;
            }
        }
        .organic-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
    </style>
<title>正在分析您的性格 - MBTI性格测试</title>
</head>
<body class="bg-warm-beige overflow-hidden">
<div class="min-h-screen flex items-center justify-center">
<div id="content-wrapper" class="flex flex-col items-center justify-center min-h-screen">
<div class="absolute top-20 left-10 w-64 h-64 bg-sage/5 organic-shape -z-10 blur-3xl"></div>
<div class="absolute bottom-20 right-10 w-80 h-80 bg-sage/5 organic-shape -z-10 blur-3xl" style="border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;"></div>
<div class="max-w-[800px] w-full flex flex-col items-center text-center">
<div class="relative w-72 h-72 mb-16 flex items-center justify-center" id="loading-circle">
<div class="absolute inset-0 bg-sage/5 organic-shape floating" style="animation-delay: 0s;"></div>
<div class="absolute inset-4 bg-sage/10 organic-shape floating" style="animation-delay: -1s; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;"></div>
<div class="absolute inset-8 bg-sage/10 organic-shape floating" style="animation-delay: -2.5s; border-radius: 70% 30% 30% 70% / 50% 70% 30% 50%;"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-sage text-[100px] opacity-90 mb-2" style="font-variation-settings: 'FILL' 0, 'wght' 100;">temp_preferences_custom</span>
<div class="flex gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-sage/40 animate-bounce" style="animation-delay: 0.1s"></span>
<span class="w-1.5 h-1.5 rounded-full bg-sage/60 animate-bounce" style="animation-delay: 0.2s"></span>
<span class="w-1.5 h-1.5 rounded-full bg-sage/40 animate-bounce" style="animation-delay: 0.3s"></span>
</div>
</div>
<div class="absolute top-4 left-1/4 w-3 h-3 rounded-full bg-sage/30"></div>
<div class="absolute bottom-12 right-1/4 w-4 h-4 rounded-full bg-sage/20"></div>
</div>
<h1 class="text-charcoal text-4xl font-bold mb-6 tracking-tight" id="title-text">
                    正在捕捉您的灵魂底色...
                </h1>
<p class="text-charcoal/60 text-lg max-w-lg mx-auto mb-14 leading-relaxed font-light" id="desc-text">
                    我们正在细致分析您的每一个回答，寻找那些构成您独特个性的细微线索。从 16 种人格原型中，为您匹配最契合的结果。
                </p>
<div class="flex flex-col items-center gap-10 w-full max-w-sm" id="progress-section">
<div class="relative flex items-center justify-center">
<svg class="w-36 h-36 transform -rotate-90">
<circle class="text-soft-clay" cx="72" cy="72" fill="transparent" r="64" stroke="currentColor" stroke-width="6"></circle>
<circle id="progress-circle" class="text-sage" cx="72" cy="72" fill="transparent" r="64" stroke="currentColor" stroke-dasharray="402.12" stroke-dashoffset="402.12" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="text-3xl font-bold text-charcoal" id="percent-text">0<span class="text-lg font-normal opacity-50">%</span></span>
<span class="text-[10px] uppercase tracking-widest text-sage font-bold">MATCHING</span>
</div>
</div>
<div class="w-full space-y-4">
<div class="h-1.5 w-full bg-soft-clay rounded-full overflow-hidden">
<div id="progress-bar" class="h-full bg-sage rounded-full" style="width: 0%;"></div>
</div>
<div class="flex justify-between items-center text-xs font-medium text-charcoal/40 tracking-widest">
<span id="progress-label">数据深度解析中</span>
<span class="italic font-serif text-sm" id="progress-hint">即将揭晓</span>
</div>
</div>
</div>
</div>
</div>
</div>
<script>
// Animation sequence
document.addEventListener('DOMContentLoaded', function() {
    var contentWrapper = document.getElementById('content-wrapper');
    var loadingCircle = document.getElementById('loading-circle');
    var titleText = document.getElementById('title-text');
    var descText = document.getElementById('desc-text');
    var progressSection = document.getElementById('progress-section');
    var progressCircle = document.getElementById('progress-circle');
    var progressBar = document.getElementById('progress-bar');
    var percentText = document.getElementById('percent-text');
    var progressLabel = document.getElementById('progress-label');

    // Step 1: Wait 1 second after load
    setTimeout(function() {
        // Step 2: Scroll up to center the loading circle (translate Y)
        loadingCircle.style.transition = 'transform 0.8s ease-out';
        loadingCircle.style.transform = 'translateY(-80px)';

        titleText.style.transition = 'opacity 0.5s ease-out';
        titleText.style.opacity = '0';

        descText.style.transition = 'opacity 0.5s ease-out';
        descText.style.opacity = '0';

        // Step 3: Circle progress from 0 to 100% over 5 seconds (starts after 0.8s)
        setTimeout(function() {
            var circleDuration = 5000; // 5 seconds
            var circleStartTime = Date.now();
            var circumference = 402.12;

            function animateCircle() {
                var elapsed = Date.now() - circleStartTime;
                var progress = Math.min(elapsed / circleDuration, 1);
                var offset = circumference * (1 - progress);

                progressCircle.style.strokeDashoffset = offset;
                var percent = Math.round(progress * 100);
                percentText.innerHTML = percent + '<span class="text-lg font-normal opacity-50">%</span>';

                if (progress < 1) {
                    requestAnimationFrame(animateCircle);
                } else {
                    // Step 4: Horizontal progress bar from 0 to 100% over 2 seconds
                    setTimeout(function() {
                        var barDuration = 2000; // 2 seconds
                        var barStartTime = Date.now();

                        function animateBar() {
                            var elapsed = Date.now() - barStartTime;
                            var progress = Math.min(elapsed / barDuration, 1);

                            progressBar.style.width = (progress * 100) + '%';

                            if (progress < 1) {
                                requestAnimationFrame(animateBar);
                            } else {
                                // Step 5: Redirect to result.html
                                progressLabel.textContent = '解析完成！';
                                setTimeout(function() {
                                    var params = window.location.search;
                                    window.location.href = 'https://mbti.7373.com.cn/result.html' + params;
                                }, 300);
                            }
                        }
                        animateBar();
                    }, 200);
                }
            }
            animateCircle();
        }, 800); // Start after scroll animation completes
    }, 1000); // Wait 1 second initially
});
</script>
</body></html>
