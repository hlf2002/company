<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MBTI 开放平台 - B端登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#7A9478", // Sage Green
                        "primary-dark": "#637a61",
                        "background-warm": "#F9F7F2", // Warm Beige
                        "soft-gray": "#F1F1F1",
                    },
                    fontFamily: {
                        "sans": ["Inter", "Noto Sans SC", "sans-serif"],
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-warm font-sans text-slate-800 antialiased;
            }
        }
        .login-card {
            @apply bg-white rounded-3xl shadow-[0_20px_50px_rgba(122,148,120,0.1)];
        }
        .input-group:focus-within .material-symbols-outlined {
            @apply text-primary;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md">
<div class="flex flex-col items-center mb-8">
<div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-primary text-white shadow-lg shadow-primary/20 mb-4">
<span class="material-symbols-outlined text-3xl">psychology</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-800">MBTI 开放平台</h1>
<p class="text-slate-400 mt-1">B端合作伙伴登录</p>
</div>
<div class="login-card p-10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-800">欢迎回来</h2>
<p class="text-sm text-slate-500 mt-2">请输入您的账号信息以管理您的测评集成</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 ml-1">手机号 / 邮箱</label>
<div class="input-group relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">person</span>
<input class="w-full bg-slate-50 border-none rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-slate-700" placeholder="请输入手机号或邮箱" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 ml-1">密码</label>
<div class="input-group relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock</span>
<input class="w-full bg-slate-50 border-none rounded-xl py-3.5 pl-12 pr-12 text-sm focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-slate-700" placeholder="请输入您的密码" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded text-primary focus:ring-primary border-slate-300" type="checkbox"/>
<span class="text-sm text-slate-600 group-hover:text-primary transition-colors">记住登录</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary-dark transition-colors" href="#">忘记密码？</a>
</div>
<button class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 transform active:scale-[0.98]" type="submit">
                    登录
                </button>
</form>
<div class="mt-10">
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-slate-100"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-slate-400 uppercase tracking-widest">其他登录方式</span>
<div class="flex-grow border-t border-slate-100"></div>
</div>
<div class="flex justify-center gap-4">
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-slate-50 text-slate-600 hover:bg-primary/10 hover:text-primary transition-all">
<svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
<path d="M8.2 13.9c.4 0 .8.1 1 .4.3.2.4.6.4 1 0 .4-.1.7-.4 1-.2.3-.6.4-1 .4-.4 0-.8-.1-1.1-.4-.2-.3-.4-.6-.4-1 0-.4.1-.7.4-1 .3-.3.7-.4 1.1-.4zm7.6 0c.4 0 .8.1 1 .4.3.2.4.6.4 1 0 .4-.1.7-.4 1-.2.3-.6.4-1 .4-.4 0-.8-.1-1.1-.4-.2-.3-.4-.6-.4-1 0-.4.1-.7.4-1 .3-.3.7-.4 1.1-.4zm-3.9-8.4c-5.4 0-9.8 4-9.8 9 0 2.8 1.4 5.3 3.7 6.9l-.9 2.7 3.2-1.6c1.2.3 2.5.5 3.8.5 5.4 0 9.8-4 9.8-9s-4.4-9-9.8-9zm0 16.3c-1.1 0-2.2-.2-3.1-.5l-.2-.1-1.9 1 .5-1.6-.1-.2c-2.1-1.4-3.4-3.7-3.4-6.1 0-4.1 3.7-7.4 8.2-7.4s8 .2 3.3 8.2 7.4-3.7 7.5-8.2 7.5z"></path>
</svg>
</button>
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-slate-50 text-slate-600 hover:bg-primary/10 hover:text-primary transition-all">
<span class="material-symbols-outlined">corporate_fare</span>
</button>
</div>
</div>
</div>
<p class="mt-8 text-center text-sm text-slate-500">
            还没有账号？
            <a class="font-bold text-primary hover:text-primary-dark transition-colors" href="#">申请成为合作伙伴</a>
</p>
<div class="mt-12 text-center">
<div class="flex justify-center gap-6 text-xs font-medium text-slate-400">
<a class="hover:text-primary transition-colors" href="#">隐私政策</a>
<a class="hover:text-primary transition-colors" href="#">服务协议</a>
<a class="hover:text-primary transition-colors" href="#">联系支持</a>
</div>
<p class="mt-4 text-[10px] text-slate-300">© 2024 MBTI Open API. 所有权归属核心测评团队。</p>
</div>
</div>

</body></html>
