<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珠海换呗科技有限公司</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #08080a;
      --bg-secondary: #0f0f12;
      --bg-card: #151519;
      --bg-card-hover: #1a1a1f;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.5);
      --text-muted: rgba(255,255,255,0.35);
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.4);
      --accent-secondary: #06b6d4;
      --accent-tertiary: #8b5cf6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', 'Noto Sans SC', -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .bg-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient-1 {
      position: absolute;
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
      top: -450px;
      left: -200px;
      opacity: 0.6;
      animation: float 25s ease-in-out infinite;
    }

    .bg-gradient-2 {
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, transparent 70%);
      bottom: -300px;
      right: -150px;
      opacity: 0.5;
      animation: float 18s ease-in-out infinite reverse;
    }

    .bg-gradient-3 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.2) 0%, transparent 70%);
      top: 40%;
      left: 60%;
      opacity: 0.4;
      animation: float 22s ease-in-out infinite;
    }

    .bg-grid {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.05); }
      66% { transform: translate(-30px, 30px) scale(0.95); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 20px 0;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(8,8,10,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-tertiary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav {
      display: flex;
      gap: 36px;
    }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-tertiary));
      transition: width 0.3s;
    }

    nav a:hover {
      color: var(--text-primary);
    }

    nav a:hover::after {
      width: 100%;
    }

    .hero {
      min-height: 100vh;
      padding-top: 140px;
      padding-bottom: 80px;
    }

    .hero-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,256,0.2);
      border-radius: 50px;
      font-size: 13px;
      color: var(--accent-tertiary);
      margin-bottom: 24px;
      animation: fadeInUp 0.8s ease-out;
    }

    .hero-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent-tertiary);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .hero-header h1 {
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }

    .hero-header h1 .gradient {
      background: linear-gradient(135deg, #fff 0%, var(--accent) 40%, var(--accent-tertiary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 20px;
      color: var(--text-secondary);
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.7;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-top: 48px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-tertiary), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .product-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-8px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .product-card:hover::before {
      opacity: 1;
    }

    .product-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .product-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
    }

    .product-card.coming .product-icon {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    }

    .product-tag {
      padding: 6px 14px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .product-card.coming .product-tag {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
      color: var(--text-muted);
    }

    .product-card h3 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .product-card > p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .product-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .product-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      transition: all 0.3s;
    }

    .product-btn:hover {
      background: linear-gradient(135deg, #2563eb, var(--accent));
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
    }

    .product-btn.secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .product-btn.secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
    }

    footer {
      padding: 40px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    footer p {
      color: var(--text-muted);
      font-size: 14px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: 1fr;
      }

      .hero-subtitle {
        font-size: 16px;
      }

      nav {
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-effects">
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>
    <div class="bg-gradient-3"></div>
    <div class="bg-grid"></div>
  </div>

  <header>
    <div class="container header-inner">
      <a href="#" class="logo">
        <div class="logo-icon">H</div>
        <span class="logo-text">珠海换呗科技</span>
      </a>
      <nav>
        <a href="#products">产品</a>
        <a href="https://github.com/hlf2002" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-header">
        <div class="hero-badge">专注软件创新</div>
        <h1><span class="gradient">珠海换呗科技有限公司</span></h1>
        <p class="hero-subtitle">致力于打造优质的软件工具和 AI 技能，赋能智能化时代</p>
      </div>

      <div class="products-grid" id="products">
        <div class="product-card">
          <div class="product-header">
            <div class="product-icon">🔐</div>
            <span class="product-tag">密码管理</span>
          </div>
          <h3>天下无密</h3>
          <p>安全、简洁的本地密码管理器。采用 AES-256-GCM 加密，支持浏览器自动填充，守护您的数字资产。</p>
          <div class="product-links">
            <a href="https://github.com/hlf2002/wumi" target="_blank" class="product-btn">
              查看 GitHub
            </a>
            <a href="https://hlf2002.github.io/wumi-web" target="_blank" class="product-btn secondary">
              产品官网
            </a>
          </div>
        </div>

        <div class="product-card coming">
          <div class="product-header">
            <div class="product-icon">✨</div>
            <span class="product-tag">即将推出</span>
          </div>
          <h3>更多产品</h3>
          <p>我们正在开发更多优质的软件工具和 AI 技能，敬请期待...</p>
          <div class="product-links">
            <span style="color: var(--text-muted); font-size: 14px;">敬请期待</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>© 2024 珠海换呗科技有限公司 · <a href="https://github.com/hlf2002" target="_blank">GitHub</a></p>
    </div>
  </footer>

  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
